server:
  port: 7081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false

spring:
  application:
    name: user_service

  datasource:
    url: jdbc:mysql://localhost:3306/bus_application?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.security: DEBUG

jwt:
  secret: VGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQgc3RyaW5nIHRoYXQgY2Fubm90IGJlIGd1ZXNzZWQ=
  expiration: 86400000


kafka:
  bootstrap-servers: localhost:9092

  topic:
    request:
      traveller-create: traveller-create-topic
    response:
      traveller-update: traveller-update-topic

  group:
    traveller-create: traveller-create-group

  consumer:
    max-attempts: 3        # number of retries
    retry-interval: 1000   # in milliseconds (1 second)

  listener:
    concurrency: 3